# GitHub Pages Deployment — Publishes docs/ folder as a website
#
# Before deploying, we strip the DDD Building Blocks section (Step 8)
# from event-storming-workshop.html so only the event storming content
# is visible on GitHub Pages. The local file stays intact.

name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/build-pages.cjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build pages (strip DDD Building Blocks)
        run: node scripts/build-pages.cjs

      - uses: actions/configure-pages@v5

      - name: Upload pages-build/
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'pages-build/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

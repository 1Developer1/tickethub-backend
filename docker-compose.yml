# TicketHub Development Services
# PostgreSQL: Ana veritabanı — ilişkisel veri, ACID transaction, full-text search
# Redis: Cache + distributed lock + BullMQ job queue backend + session
# MailHog: Development email test aracı — gerçek email göndermeden tarayıcıda görüntüle

services:
  postgres:
    image: postgres:16-alpine
    container_name: tickethub-postgres
    environment:
      POSTGRES_USER: tickethub
      POSTGRES_PASSWORD: tickethub_secret
      POSTGRES_DB: tickethub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickethub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tickethub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: tickethub-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — http://localhost:8025 ile tarayıcıda email'leri gör
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
